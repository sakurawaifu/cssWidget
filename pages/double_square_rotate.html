<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-GT4VRT1WVF"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-GT4VRT1WVF');
  </script>
  <title>双矩形旋转效果</title>
  <meta charset="utf-8">
  <style>
      body {
          margin: 0;
          height: 100vh;
          display: flex;
          justify-content: center;
          align-items: center;
      }

      div[class*="square"] {
          transition: linear .15s;
          position: absolute;
          width: 23.57vh;
          height: 23.57vh;
          box-shadow: 0 0 10px 5px darkred;
      }

      div.square1 {
          background-color: orangered;
      }

      div.square2 {
          transform: rotateZ(45deg);
          background-color: white;
      }

      .wrapper {
          width: 34vh;
          height: 34vh;
          display: flex;
          justify-content: center;
          align-items: center;
          background-color: transparent;
      }

      .wrapper:hover div.square1 {
          transform: rotateZ(45deg);
      }

      .wrapper:hover div.square2 {
          transform: none;
      }
  </style>
</head>
<body>
<div class="wrapper">
  <div class="square1"></div>
  <div class="square2"></div>
</div>

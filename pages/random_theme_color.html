<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-GT4VRT1WVF"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-GT4VRT1WVF');

  <meta charset="utf-8">
  <title>随机主题色</title>
  <style>
      :root {
          --theme-color: initial;
          background-color: var(--theme-color);
      }

      body {
          margin: 0;
          height: 100vh;
          display: flex;
      }

      button {
          position: relative;
          box-sizing: border-box;
          margin: auto;
          padding: 0.5em 1em;
          border: none;
          background-color: transparent;
          color: var(--theme-color);
          font-size: 1.5rem;
          cursor: pointer;
      }

      button::before {
          position: absolute;
          content: '';
          top: 0;
          left: 0;
          z-index: -1;
          width: 100%;
          height: 100%;
          background-color: var(--theme-color);
          filter: invert(1);
          transition: box-shadow 0.1s;
      }

      button:hover::before {
          box-shadow: 0 0 8px 2px var(--theme-color);
      }

      button:active::before {
          box-shadow: none;
      }
  </style>
</head>
<body>
<button id="btn">
  <span class="text">随机皮肤</span>
</button>
<script>
  document.documentElement.style.setProperty('--theme-color', localStorage.getItem('theme-color') || 'initial')

  const randomComponent = () => ~~(Math.random() * 256)

  const randomRGB = () => {
    const R = randomComponent()
    const G = randomComponent()
    const B = randomComponent()
    return `rgb(${R}, ${G}, ${B})`
  }

  document.getElementById('btn').addEventListener('click', () => {
    const color = randomRGB()
    localStorage.setItem('theme-color', color)
    document.documentElement.style.setProperty('--theme-color', color)
  })
</script>
